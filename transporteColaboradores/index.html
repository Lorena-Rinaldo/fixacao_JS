<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Transporte Fretado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #historico::-webkit-scrollbar {
            width: 4px;
        }

        #historico::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-x-hidden">

    <!-- Fundo Decorativo -->
    <div class="absolute top-0 left-0 w-full h-80 bg-gradient-to-br from-indigo-600 to-purple-800 -z-10 shadow-inner"
        style="clip-path: ellipse(100% 40% at 50% 0%);"></div>

    <!-- Botão Voltar -->
    <a href="../index.html"
        class="self-start mb-6 lg:absolute lg:top-8 lg:left-8 flex items-center gap-2 text-white/80 hover:text-white transition-colors font-bold text-sm uppercase tracking-widest">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Voltar
    </a>

    <div class="flex flex-col lg:flex-row gap-6 w-full max-w-5xl items-start justify-center">

        <!-- CARD 1: Calculadora -->
        <main
            class="bg-white p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-900/10 w-full lg:max-w-md border border-slate-100 flex-shrink-0">
            <header class="mb-8 text-center">
                <div
                    class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center text-2xl mb-4 mx-auto shadow-lg shadow-indigo-200">
                    🚌
                </div>
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Custo de Fretado</h1>
                <p class="text-slate-400 text-xs mt-1">Gestão de transporte de colaboradores</p>
                <p id="dataHoraAtual" class="text-slate-500 text-xs mt-3 font-semibold"></p>
            </header>

            <form class="space-y-4">
                <div>
                    <label for="quantidadeFuncionarios"
                        class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Qtd. de
                        Funcionários</label>
                    <input type="number" id="quantidadeFuncionarios" placeholder="Ex: 100"
                        class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold text-slate-700">
                </div>

                <div>
                    <label for="quantidadeDiasUteis"
                        class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Dias
                        Úteis no Mês</label>
                    <input type="number" id="quantidadeDiasUteis" placeholder="Ex: 22"
                        class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold text-slate-700">
                </div>

                <button type="button" onclick="calcularCustoMensal()"
                    class="w-full py-4 bg-slate-900 text-white font-extrabold rounded-2xl hover:bg-indigo-600 transform active:scale-[0.98] transition-all shadow-xl hover:shadow-indigo-500/40">
                    Calcular Custo Mensal
                </button>
            </form>

            <!-- Área de Resultado -->
            <section id="areaResultado"
                class="mt-6 p-5 bg-indigo-50 rounded-3xl border border-indigo-100 hidden animate-in fade-in zoom-in duration-300">
                <h2 class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest text-center">Total do
                    Investimento</h2>
                <p id="valorFinal" class="text-3xl font-black text-indigo-900 text-center mt-1 tracking-tighter">R$ 0,00
                </p>
            </section>
        </main>

        <!-- CARD 2: Histórico -->
        <aside
            class="bg-white/70 backdrop-blur-sm p-8 rounded-[2.5rem] shadow-xl shadow-indigo-900/5 w-full lg:max-w-xs border border-white self-stretch flex flex-col">
            <header class="mb-6">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center">
                    <span class="w-8 h-px bg-slate-200 mr-3"></span>
                    Histórico
                </h3>
            </header>

            <div id="historico"
                class="text-xs text-slate-600 font-medium leading-relaxed overflow-y-auto max-h-[400px] lg:max-h-full space-y-3 pr-2 italic">
                <div class="p-3 bg-white/50 rounded-xl border border-slate-100 shadow-sm">
                    Nenhum cálculo realizado ainda.
                </div>
            </div>

            <div class="mt-auto pt-4 text-[10px] text-slate-300 text-center font-bold uppercase tracking-tighter">
                Registros recentes
            </div>
        </aside>

    </div>

    <script src="./script.js"></script>
</body>

</html>
